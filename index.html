<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevDash</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <div id="app">
    <header class="bg-warning text-white text-center py-4 mb-4 shadow-sm">
      <h1 class="h2 m-0 fw-bold">DevDash</h1>
      <p class="m-0 opacity-75 mt-1">Asynchronous Data Dashboard & TypeScript Type Verification</p>
    </header>
    <main class="container">
      <section id="controls" class="row g-3 bg-white p-3 rounded shadow-sm mb-4 d-none">
        <div class="col-md-4">
          <label for="search-input" class="form-label fw-semibold text-muted small text-uppercase">Search</label>
          <input type="text" id="search-input" class="form-control" placeholder="Search product by name or details.." />
        </div>
        <div class="col-md-4">
          <label for="category-filter" class="form-label fw-semibold text-muted small text-uppercase">Category</label>
          <select id="category-filter" class="form-select">
            <option value="all">All Categories</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="sort-select" class="form-label fw-semibold text-muted small text-uppercase">Sort by Price</label>
          <select id="sort-select" class="form-select">
            <option value="none">Default</option>
            <option value="asc">Low to High</option>
            <option value="desc">High to Low</option>
          </select>
        </div>
      </section>
      <section id="content-area">
        <div id="loading-indicator" class="text-center py-5 bg-white rounded shadow-sm d-none">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading</span>
          </div>
          <p class="mt-2 text-muted">Loading data, please wait....</p>
        </div>
        <div id="error-indicator" class="alert alert-danger d-none" role="alert"></div>
        <div id="product-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
      </section>


      <div id="detail-modal" class="modal d-none" tabindex="-1" style="background: rgba(0,0,0,0.5); z-index: 1050;">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title fw-bold">Product Details</h5>
              <button type="button" class="btn-close" id="close-modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body">
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
